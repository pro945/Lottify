<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page</title>
   <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        #mymenu {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px 30px;
            border-radius: 8px;
            margin: 20px;
        }

        .menu-left, .menu-right {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 15px;
        }

        .menu-left { margin-left: 30px; }

        #mymenu ul li a {
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            background: #333;
            border-radius: 5px;
        }

        #mymenu ul li a:hover { background: #555; }

        .products-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1000px;
            margin: 20px auto;
            justify-content: center;
        }

        .product-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 250px;
        }

        .product-image { width: 100%; height: auto; }

        .add-to-cart {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            margin-top: 10px;
            border-radius: 5px;
        }

        .add-to-cart:hover { background: #218838; }
    </style>
</head>
<body>

 <!-- Menu Box -->
<div id="mymenu">
    <ul class="menu-left">
        <li><a href="Mcart.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-cart4" viewBox="0 0 16 16">
            <path d="M0 2.5A.5.5 0 0 1 .5 2H2a.5.5 0 0 1 .485.379L2.89 4H14.5a.5.5 0 0 1 .485.621l-1.5 6A.5.5 0 0 1 13 11H4a.5.5 0 0 1-.485-.379L1.61 3H.5a.5.5 0 0 1-.5-.5M3.14 5l.5 2H5V5zM6 5v2h2V5zm3 0v2h2V5zm3 0v2h1.36l.5-2zm1.11 3H12v2h.61zM11 8H9v2h2zM8 8H6v2h2zM5 8H3.89l.5 2H5zm0 5a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0m9-1a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0"/>
            </svg>
        </a></li>
    </ul>

    <ul class="menu-right">
        <li><input type="text" id="searchBar" placeholder="Search items..."></li> 
        <li><a><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
        </svg></a></li>
        <li><a href="Menu.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-house" viewBox="0 0 16 16">
            <path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293zM13 7.207V13.5a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5V7.207l5-5z"/>
        </svg>
        </a></li>
    </ul>
</div>

    <!-- Products -->
    <div class="products-container" id="products-container"></div>

    <script>
        // Product data array (12 products)
        const products = [
            { id: 1, name: "Samsung Galaxy S23", desc: "200x Zoom.", Coin: 50000, img: "sa.jpg" },
            { id: 2, name: "Iphone 15", desc: "Deep ocean blue.", Coin: 600050, img: "ip2.jpg" },
            { id: 3, name: "Iphone 14", desc: "Ocean Blue", Coin: 450000, img: "ip1.jpg" },
            { id: 4, name: "Gaming Laptop", desc: "RTX 9070.", Coin: 250000, img: "lap.jpg" },
            { id: 5, name: "Home Theatre", desc: "Dolby Atmos.", Coin: 65000, img: "mu3.jpg" },
            { id: 6, name: "Printer", desc: "Advanced colour.", Coin: 11100, img: "po.jpg" },
            { id: 7, name: "Boat Headphone", desc: "High-quality audio.", Coin: 100000, img: "h2.jpg" },
            { id: 8, name: "Noise earphone", desc: "Premium sound.", Coin: 150000, img: "h1.jpg" },
            { id: 9, name: "Earpods Pro", desc: "Powerful performance.", Coin: 148700, img: "baa.jpg" },
            { id: 10, name: "Projector DCLL", desc: "Top-selling.", Coin: 139999, img: "mu3.jpg" },
            { id: 11, name: "Canon Camera", desc: "Professional camera.", Coin: 140006, img: "ca1.jpg" },
            { id: 12, name: "3D Printer", desc: "Perfect for creators.", Coin: 159099, img: "pr.jpg" }
        ];

        const productsContainer = document.getElementById("products-container");

        // Generate product cards
        function generateProducts() {
            products.forEach(product => {
                const productDiv = document.createElement("div");
                productDiv.classList.add("product-container");
                productDiv.innerHTML = `
                    <img class="product-image" src="${product.img}" alt="${product.name}">
                    <h2>${product.name}</h2>
                    <p>${product.desc}</p>

                    <!-- FIXED PRICE: USING COIN VALUE -->
                    <p><strong>Price: 🪙 ${product.Coin} coins</strong></p>

                    <button class="add-to-cart" onclick="addToCart(${product.id})">Add to Cart</button>
                    <p id="cart-message-${product.id}" style="color: green; display: none;">Added to cart!</p>
                `;
                productsContainer.appendChild(productDiv);
            });
        }

        // Add to cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.push(product);
            localStorage.setItem("cart", JSON.stringify(cart));

            animateProductToCart(productId);
        }

        // Animation to cart
        function animateProductToCart(productId) {
            const productImage = document.querySelector(`.product-container:nth-child(${productId}) .product-image`);
            if (!productImage) return;

            const cartIcon = document.querySelector("#mymenu .menu-left a");

            const flyingImage = productImage.cloneNode(true);
            flyingImage.style.position = "fixed";
            flyingImage.style.width = "50px"; 
            flyingImage.style.zIndex = "1000";
            flyingImage.style.transition = "all 1s ease-in-out";
            document.body.appendChild(flyingImage);

            const imgRect = productImage.getBoundingClientRect();
            const cartRect = cartIcon.getBoundingClientRect();

            flyingImage.style.left = imgRect.left + "px";
            flyingImage.style.top = imgRect.top + "px";

            setTimeout(() => {
                flyingImage.style.left = cartRect.left + "px";
                flyingImage.style.top = cartRect.top + "px";
                flyingImage.style.opacity = "0";
                flyingImage.style.transform = "scale(0.1)";
            }, 100);

            setTimeout(() => {
                document.body.removeChild(flyingImage);
            }, 1000);
        }

        // Search feature
        document.getElementById("searchBar").addEventListener("input", function () {
            const query = this.value.toLowerCase();
            const productContainers = document.querySelectorAll(".product-container");
            let found = false;

            productContainers.forEach(product => {
                const productName = product.querySelector("h2").textContent.toLowerCase();
                const productDesc = product.querySelector("p").textContent.toLowerCase();

                if (productName.includes(query) || productDesc.includes(query)) {
                    product.style.display = "block";
                    found = true;
                } else {
                    product.style.display = "none";
                }
            });

            let message = document.getElementById("outOfStockMessage");
            if (!message) {
                message = document.createElement("p");
                message.id = "outOfStockMessage";
                message.style.color = "red";
                message.style.fontWeight = "bold";
                message.style.textAlign = "center";
                message.style.display = "none";
                message.textContent = "This product is out of stock.";
                document.querySelector(".products-container").appendChild(message);
            }

            message.style.display = found ? "none" : "block";
        });

        generateProducts();
    </script>

</body>
</html>
