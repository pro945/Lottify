<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lootify Sign-up</title>
    <!-- Add your CSS files here -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.2.2/css/dataTables.dataTables.min.css" class="css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.17.2/dist/sweetalert2.min.css" rel="stylesheet">
</head>

<body>
    <div class="icon" style="margin-top: 50px;">
        
    </div>

    <div class="container" style="margin-top: 50px;" >
        <!-- Main Content -->
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5" style="display: flow-root;">
                <div class="card shadow-sm" style="background-color: black;">
                    <div class="card-header text-center text-white" style="background-color: blueviolet;">
                        <h4 class="mb-0">Login</h4>
                    </div>
                    <div class="card-body">
                        <form action="login.jsp" method="post">
                            <div class="mb-3">
                                <label for="email" class="form-label" style="color: #f8f9fa;">Enter usernsme</label>
                                <input type="text" name="u1" id="email" class="form-control"
                                    placeholder="name" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label" style="color: #f8f9fa;">Password</label>
                                <input type="password" name="u2" id="password" class="form-control"
                                    placeholder="Enter your password" required>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" name="remember" id="remember" class="form-check-input" style="color: #f8f9fa;">
                                <label for="remember" class="form-check-label" style="color: #f8f9fa;">Remember me</label>
                            </div>
                            <div class="d-grid">
                                <button type="submit" style="background-color: blueviolet; color: #f8f9fa;">
                                    Sign In
                                </button>
                            </div>
                        </form>
                        <form action="Regis.html">
                        <div class="d-grid gap-2 my-3">
                            <!-- Continue with Google Button -->
                            <button class="btn btn-outline-danger" type="button">
                                <i class="fab fa-google"></i> Continue with Google
                            </button>
                            <!-- Continue with Apple Button -->
                            <button class="btn btn-outline-dark" type="button" style="color: #f8f9fa;">
                                <i class="fab fa-apple"></i> Continue with Apple
                            </button>
                        </div>
                    </div>
                    <div class="card-footer text-center">
                        <small class="text-muted">Don't have an account? <button  class="btn btn-primary" 
                                style="background-color: blueviolet;">Register</button> </small>
                    </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
       

    <!-- Bootstrap JS and dependencies (Popper.js included) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    <script src="https://cdn.datatables.net/2.2.2/js/dataTables.min.js"></script>

    <!-- Add Font Awesome for icons -->
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>

    <!-- Dynamic Background Image Script -->
    <script>
        // Example of changing the background dynamically.
        // Replace 'background.jpg' with your desired image file.
        const dynamicBackgroundImage = "DeWatermark.ai_1741424361969.png";
        document.body.style.backgroundImage = `url(${dynamicBackgroundImage})`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundPosition = "center";
        document.body.style.height = "100vh"; // Ensure it covers the full screen
    </script>
    </form>
    </body>


</html>
