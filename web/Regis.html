<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lootify Sign-up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body style="background-image: url(DeWatermark.ai_1741424361969.png); background-size: cover; background-position: center; height: 100vh;">
    <div class="icon" style="margin-top: 50px;">
        <img src="logo2.png" alt="background" style="width: 350px; height: 100px; display: flex; justify-content: center; align-items: center; margin: 0 auto; ">
    </div>
    <div class="container" style="margin-top: 50px;">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm" style="background-color: black;">
                    <div class="card-header text-center text-white" style="background-color: blueviolet;">
                        <h4 class="mb-0">Register</h4>
                    </div>
                    <div class="card-body">
                  <form action="regis.jsp" method="post">
                            <div id="step-1">
                                <div class="mb-3">
                                    <label for="username" class="form-label" style="color: #f8f9fa;">Username</label>
                                    <input type="text" name="un" id="username" class="form-control" placeholder="Enter your username" required>
                                </div>
                                <div class="mb-3">
                                    <label for="name" class="form-label" style="color: #f8f9fa;">Full Name</label>
                                    <input type="text" name="uc" id="name" class="form-control" placeholder="Enter your full name" required>
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label" style="color: #f8f9fa;">Password</label>
                                    <input type="password" name="up" id="password" class="form-control" placeholder="Create a password" required>
                                
              
                                    <button type="submit" class="btn" style="background-color: blueviolet; color: #f8f9fa;">Sign Up</button>
                                </div>
                            
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        $(document).ready(function() {
            $("#next-1").click(function() {
                $("#step-1").hide();
                $("#step-2").show();
            });
            $("#prev-2").click(function() {
                $("#step-2").hide();
                $("#step-1").show();
            });
            $("#next-2").click(function() {
                $("#step-2").hide();
                $("#step-3").show();
            });
            $("#prev-3").click(function() {
                $("#step-3").hide();
                $("#step-2").show();
            });
        });
    </script>
</body>
</html>
